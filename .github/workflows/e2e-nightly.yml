name: E2E nightly

on:
    schedule:
        - cron: "15 3 * * *"
    workflow_dispatch:
        inputs:
            git_ref:
                description: "Branch or SHA (empty = variable E2E_TARGET_BRANCH, else fixes/staging)"
                required: false
                type: string

concurrency:
    group: e2e-nightly
    cancel-in-progress: false

jobs:
    playwright:
        runs-on: ubuntu-latest
        timeout-minutes: 45

        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: fixies_e2e
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U postgres -d fixies_e2e"
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 10

        env:
            DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fixies_e2e
            PORT: "3000"
            NODE_ENV: development
            FRONTEND_URL: http://localhost:5173
            APP_ORIGIN: http://localhost:5173
            JWT_SECRET: e2e-ci-jwt-secret-at-least-32-characters
            JWT_REFRESH_SECRET: e2e-ci-refresh-secret-at-least-32-chars
            EMAIL_SENDER: e2e@example.com
            RESEND_API_KEY: re_ci_placeholder
            STRIPE_SECRET_KEY: ${{ secrets.E2E_STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
            VITE_API_URL: http://localhost:3000
            PLAYWRIGHT_API_BASE_URL: http://localhost:3000
            PLAYWRIGHT_CHEF_EMAIL: ${{ secrets.E2E_PLAYWRIGHT_CHEF_EMAIL }}
            PLAYWRIGHT_CHEF_PASSWORD: ${{ secrets.E2E_PLAYWRIGHT_CHEF_PASSWORD }}
            # Default branch to test when E2E_TARGET_BRANCH is unset (not main).
            E2E_DEFAULT_TEST_BRANCH: fixes/staging

        steps:
            - name: Resolve git ref to test
              id: e2e-ref
              run: |
                  MANUAL='${{ github.event.inputs.git_ref }}'
                  VAR_REF='${{ vars.E2E_TARGET_BRANCH }}'
                  DEFAULT_BRANCH='${{ env.E2E_DEFAULT_TEST_BRANCH }}'
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$MANUAL" ]; then
                    REF="$MANUAL"
                  elif [ -n "$VAR_REF" ]; then
                    REF="$VAR_REF"
                  else
                    REF="$DEFAULT_BRANCH"
                  fi
                  echo "E2E testing ref: $REF"
                  echo "ref=$REF" >> "$GITHUB_OUTPUT"

            - name: Check required E2E secrets
              env:
                  STRIPE_SECRET_KEY: ${{ secrets.E2E_STRIPE_SECRET_KEY }}
                  CHEF_EMAIL: ${{ secrets.E2E_PLAYWRIGHT_CHEF_EMAIL }}
                  CHEF_PASSWORD: ${{ secrets.E2E_PLAYWRIGHT_CHEF_PASSWORD }}
              run: |
                  missing=0
                  if [ -z "$STRIPE_SECRET_KEY" ]; then
                    echo "::error::Set E2E_STRIPE_SECRET_KEY (Stripe test sk_test_…)."
                    missing=1
                  fi
                  if [ -z "$CHEF_EMAIL" ]; then
                    echo "::error::Set E2E_PLAYWRIGHT_CHEF_EMAIL (same email seed will create)."
                    missing=1
                  fi
                  if [ -z "$CHEF_PASSWORD" ]; then
                    echo "::error::Set E2E_PLAYWRIGHT_CHEF_PASSWORD (same password as seed admin)."
                    missing=1
                  fi
                  exit $missing

            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ steps.e2e-ref.outputs.ref }}

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install server dependencies
              working-directory: server
              run: npm ci

            - name: Apply Prisma migrations
              working-directory: server
              run: npx prisma migrate deploy --schema=src/prisma/schema.prisma

            - name: Seed DB user for Playwright chef login
              working-directory: server
              env:
                  SEED_ADMIN_EMAIL: ${{ secrets.E2E_PLAYWRIGHT_CHEF_EMAIL }}
                  SEED_ADMIN_PASSWORD: ${{ secrets.E2E_PLAYWRIGHT_CHEF_PASSWORD }}
              run: npm run seed

            - name: Start API server
              working-directory: server
              run: |
                  npm run dev &
                  for attempt in $(seq 1 60); do
                    if curl -sf http://127.0.0.1:3000/ >/dev/null; then
                      echo "API is up"
                      exit 0
                    fi
                    sleep 2
                  done
                  echo "API did not become ready in time"
                  exit 1

            - name: Install client dependencies
              working-directory: client
              run: npm ci

            - name: Install Playwright browsers
              working-directory: client
              run: npx playwright install --with-deps

            - name: Run Playwright E2E
              working-directory: client
              run: npx playwright test

            - name: Upload Playwright report
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: client/playwright-report/
