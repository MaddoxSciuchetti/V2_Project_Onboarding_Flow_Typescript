name: E2E nightly

on:
    schedule:
        - cron: "15 3 * * *"
    workflow_dispatch:

concurrency:
    group: e2e-nightly-${{ github.ref }}
    cancel-in-progress: false

jobs:
    playwright:
        runs-on: ubuntu-latest
        timeout-minutes: 45

        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: fixies_e2e
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U postgres -d fixies_e2e"
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 10

        env:
            DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fixies_e2e
            PORT: "3000"
            NODE_ENV: development
            FRONTEND_URL: http://localhost:5173
            APP_ORIGIN: http://localhost:5173
            JWT_SECRET: e2e-ci-jwt-secret-at-least-32-characters
            JWT_REFRESH_SECRET: e2e-ci-refresh-secret-at-least-32-chars
            EMAIL_SENDER: e2e@example.com
            RESEND_API_KEY: re_ci_placeholder
            STRIPE_SECRET_KEY: ${{ secrets.E2E_STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
            VITE_API_URL: http://localhost:3000
            PLAYWRIGHT_API_BASE_URL: http://localhost:3000

        steps:
            - name: Check E2E_STRIPE_SECRET_KEY is configured
              env:
                  STRIPE_SECRET_KEY: ${{ secrets.E2E_STRIPE_SECRET_KEY }}
              run: |
                  if [ -z "$STRIPE_SECRET_KEY" ]; then
                    echo "::error::Set Actions secret E2E_STRIPE_SECRET_KEY to your Stripe test secret key."
                    exit 1
                  fi

            - name: Checkout
              uses: actions/checkout@v4

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install server dependencies
              working-directory: server
              run: npm ci

            - name: Apply Prisma migrations
              working-directory: server
              run: npx prisma migrate deploy --schema=src/prisma/schema.prisma

            - name: Start API server
              working-directory: server
              run: |
                  npm run dev &
                  for attempt in $(seq 1 60); do
                    if curl -sf http://127.0.0.1:3000/ >/dev/null; then
                      echo "API is up"
                      exit 0
                    fi
                    sleep 2
                  done
                  echo "API did not become ready in time"
                  exit 1

            - name: Install client dependencies
              working-directory: client
              run: npm ci

            - name: Install Playwright browsers
              working-directory: client
              run: npx playwright install --with-deps

            - name: Run Playwright E2E
              working-directory: client
              run: npx playwright test

            - name: Upload Playwright report
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: client/playwright-report/
